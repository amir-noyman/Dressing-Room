<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dressing Room</title>
  <style>
    /* ── Theme tokens ── */
    :root {
      --bg-gradient-from: #1E1E2E;
      --bg-gradient-to: #2D2B55;
      --bg-surface: rgba(30,30,46,0.95);
      --text-primary: #fff;
      --text-body: #E0DEF0;
      --text-secondary: #C0BCD0;
      --text-muted: #8880A8;
      --text-faint: #6860A0;
      --text-powered: #7A7494;
      --border: rgba(255,255,255,0.08);
      --border-light: rgba(255,255,255,0.04);
      --border-subtle: rgba(255,255,255,0.06);
      --surface-raised: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --surface-input: rgba(255,255,255,0.06);
      --btn-secondary-bg: rgba(255,255,255,0.08);
      --btn-secondary-hover: rgba(255,255,255,0.14);
      --btn-secondary-border: rgba(255,255,255,0.12);
      --btn-disabled-bg: rgba(255,255,255,0.08);
      --btn-disabled-text: rgba(255,255,255,0.3);
      --btn-disabled-border: rgba(255,255,255,0.06);
      --swatch-border: rgba(255,255,255,0.15);
      --battery-track: rgba(255,255,255,0.04);
      --accent-count: #38BDF8;
      --accent-link: #A78BFA;
      --accent-link-hover: #C4B5FD;
      --accent-link-glow: rgba(167,139,250,0.3);
      --accent-link-glow-hover: rgba(167,139,250,0.6);
      --notify-success-bg: rgba(74,222,128,0.12);
      --notify-success-text: #4ADE80;
      --notify-success-border: rgba(74,222,128,0.2);
      --notify-error-bg: rgba(248,113,113,0.12);
      --notify-error-text: #F87171;
      --notify-error-border: rgba(248,113,113,0.2);
      --notify-info-bg: rgba(99,82,220,0.12);
      --notify-info-text: #A78BFA;
      --notify-info-border: rgba(99,82,220,0.2);
      --match-high: #4ADE80;
      --match-high-glow: rgba(74,222,128,0.3);
      --match-medium: #FB923C;
      --match-medium-glow: rgba(251,146,60,0.3);
      --cat-color: #4ADE80;
      --cat-spacing: #38BDF8;
      --cat-typography: #A78BFA;
      --cat-radius: #FB923C;
      --cat-borders: #F472B6;
      --cat-other: #8880A8;
      --glow-strength: 0.5;
      --btn-primary-bg: #4338CA;
      --btn-primary-hover: #5145D6;
      --btn-primary-glow: rgba(99,82,220,0.2);
      --btn-primary-glow-hover: rgba(99,82,220,0.5);
      --stats-inline: #8880A8;
    }

    [data-theme="light"] {
      --bg-gradient-from: #ffffff;
      --bg-gradient-to: #ffffff;
      --bg-surface: #ffffff;
      --text-primary: #1E1E2E;
      --text-body: #333;
      --text-secondary: #555;
      --text-muted: #888;
      --text-faint: #aaa;
      --text-powered: #bbb;
      --border: rgba(0,0,0,0.1);
      --border-light: rgba(0,0,0,0.05);
      --border-subtle: rgba(0,0,0,0.06);
      --surface-raised: rgba(0,0,0,0.03);
      --surface-hover: rgba(0,0,0,0.06);
      --surface-input: #fff;
      --btn-secondary-bg: rgba(0,0,0,0.05);
      --btn-secondary-hover: rgba(0,0,0,0.1);
      --btn-secondary-border: rgba(0,0,0,0.12);
      --btn-disabled-bg: rgba(0,0,0,0.05);
      --btn-disabled-text: rgba(0,0,0,0.25);
      --btn-disabled-border: rgba(0,0,0,0.08);
      --swatch-border: rgba(0,0,0,0.1);
      --battery-track: rgba(0,0,0,0.06);
      --accent-count: #1565c0;
      --accent-link: #7C3AED;
      --accent-link-hover: #6D28D9;
      --accent-link-glow: none;
      --accent-link-glow-hover: rgba(124,58,237,0.25);
      --notify-success-bg: #e8f5e9;
      --notify-success-text: #2e7d32;
      --notify-success-border: #c8e6c9;
      --notify-error-bg: #fdecea;
      --notify-error-text: #c62828;
      --notify-error-border: #f5c6cb;
      --notify-info-bg: #ede7f6;
      --notify-info-text: #5e35b1;
      --notify-info-border: #d1c4e9;
      --match-high: #2e7d32;
      --match-high-glow: none;
      --match-medium: #e65100;
      --match-medium-glow: none;
      --cat-color: #2e7d32;
      --cat-spacing: #1565c0;
      --cat-typography: #7c3aed;
      --cat-radius: #e65100;
      --cat-borders: #c2185b;
      --cat-other: #999;
      --glow-strength: 0;
      --btn-primary-bg: #4338CA;
      --btn-primary-hover: #5145D6;
      --btn-primary-glow: rgba(99,82,220,0.1);
      --btn-primary-glow-hover: rgba(99,82,220,0.25);
      --stats-inline: #888;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Inter', 'Segoe UI', sans-serif;
      font-size: 11px;
      color: var(--text-body);
      background: linear-gradient(135deg, var(--bg-gradient-from) 0%, var(--bg-gradient-to) 100%);
      min-height: 100vh;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: var(--bg-surface);
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .header h1 { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .theme-group {
      display: inline-flex;
      border: 1px solid var(--btn-secondary-border);
      border-radius: 5px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .theme-group button {
      width: 24px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      transition: background 0.15s, color 0.15s;
    }
    .theme-group button:first-child { border-right: 1px solid var(--btn-secondary-border); }
    .theme-group button:hover { background: var(--surface-hover); }
    .theme-group button.active {
      background: var(--btn-primary-bg);
      color: #fff;
    }
    .theme-group svg { width: 12px; height: 12px; }

    /* ── Sections ── */
    .section { padding: 16px 16px; }
    .section + .section { border-top: 1px solid var(--border); }

    /* ── Battery bar ── */
    .battery {
      display: none;
      margin-top: 14px;
      height: 8px;
      border-radius: 4px;
      background: var(--battery-track);
      overflow: hidden;
      position: relative;
    }
    .battery.visible { display: flex; }
    .battery-segment {
      height: 100%;
      min-width: 2px;
      transition: flex-grow 0.4s ease;
    }
    .battery-segment.Color { background: var(--cat-color); box-shadow: 0 0 8px rgba(74,222,128,var(--glow-strength)); }
    .battery-segment.Spacing { background: var(--cat-spacing); box-shadow: 0 0 8px rgba(56,189,248,var(--glow-strength)); }
    .battery-segment.Typography { background: var(--cat-typography); box-shadow: 0 0 8px rgba(167,139,250,var(--glow-strength)); }
    .battery-segment.Radius { background: var(--cat-radius); box-shadow: 0 0 8px rgba(251,146,60,var(--glow-strength)); }
    .battery-segment.Borders { background: var(--cat-borders); box-shadow: 0 0 8px rgba(244,114,182,var(--glow-strength)); }
    .battery-segment.Other { background: var(--cat-other); }
    .battery-segment:first-child { border-radius: 4px 0 0 4px; }
    .battery-segment:last-child { border-radius: 0 4px 4px 0; }
    .battery-segment:only-child { border-radius: 4px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 32px;
      padding: 0 12px;
      border: none;
      border-radius: 6px;
      font-family: inherit;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-primary {
      width: 100%;
      background: var(--btn-primary-bg);
      color: #fff;
      box-shadow: 0 0 10px var(--btn-primary-glow);
    }
    .btn-primary:hover { background: var(--btn-primary-hover); box-shadow: 0 0 20px var(--btn-primary-glow-hover); }
    .btn-primary:disabled { background: var(--btn-disabled-bg); color: var(--btn-disabled-text); box-shadow: none; cursor: default; }
    .btn-success {
      width: 100%;
      background: #1bc47d;
      color: #fff;
      box-shadow: 0 0 12px rgba(27,196,125,0.25);
    }
    .btn-success:hover { background: #2dd891; box-shadow: 0 0 18px rgba(27,196,125,0.35); }
    .btn-success:disabled { background: var(--btn-disabled-bg); color: var(--btn-disabled-text); box-shadow: none; cursor: default; }
    .btn-secondary {
      background: var(--btn-secondary-bg);
      color: var(--text-secondary);
      border: 1px solid var(--btn-secondary-border);
    }
    .btn-secondary:hover { background: var(--btn-secondary-hover); color: var(--text-body); }
    .btn-secondary:disabled { background: var(--btn-disabled-bg); color: var(--btn-disabled-text); border-color: var(--btn-disabled-border); cursor: default; }

    /* ── Token summary ── */
    .token-summary {
      display: none;
      margin-top: 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .token-summary.visible { display: block; }
    .token-summary-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: var(--surface-raised);
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }
    .token-summary-list {
    }
    .token-summary-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      font-size: 10px;
      border-bottom: 1px solid var(--border-light);
    }
    .token-summary-row:last-child { border-bottom: none; }
    .token-summary-name {
      font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
      font-weight: 500;
      color: var(--text-body);
    }
    .token-summary-count {
      font-weight: 500;
      color: var(--accent-count);
      min-width: 20px;
      text-align: right;
    }
    .token-summary-collection {
      color: var(--text-faint);
      font-size: 9px;
      margin-left: 6px;
    }

    /* ── Results ── */
    .results { display: none; }
    .results.visible { display: block; }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }
    .results-header label {
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text-secondary);
    }
    .results-count {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Category groups (accordion) ── */
    .category {
      margin-bottom: 3px;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .category-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      cursor: pointer;
      background: var(--surface-raised);
      user-select: none;
      transition: background 0.1s;
    }
    .category-header:hover { background: var(--surface-hover); }
    .category-chevron {
      font-size: 8px;
      transition: transform 0.15s;
      margin-left: auto;
      color: var(--text-faint);
    }
    .category.collapsed .category-chevron { transform: rotate(-90deg); }
    .category-body {
      padding: 0 10px;
    }
    .category.collapsed .category-body { display: none; }

    .category-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .category-dot.Spacing { background: var(--cat-spacing); box-shadow: 0 0 6px rgba(56,189,248,var(--glow-strength)); }
    .category-dot.Typography { background: var(--cat-typography); box-shadow: 0 0 6px rgba(167,139,250,var(--glow-strength)); }
    .category-dot.Radius { background: var(--cat-radius); box-shadow: 0 0 6px rgba(251,146,60,var(--glow-strength)); }
    .category-dot.Borders { background: var(--cat-borders); box-shadow: 0 0 6px rgba(244,114,182,var(--glow-strength)); }
    .category-dot.Color { background: var(--cat-color); box-shadow: 0 0 6px rgba(74,222,128,var(--glow-strength)); }
    .category-dot.Other { background: var(--cat-other); }

    /* ── Match rows ── */
    .match-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .match-row:last-child { border-bottom: none; }
    .match-row input[type="checkbox"] {
      margin-top: 2px;
      flex-shrink: 0;
    }
    .match-info { flex: 1; min-width: 0; }
    .match-node {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-body);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .match-detail {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .match-detail .field { color: var(--text-faint); }
    .match-detail .value { font-weight: 500; color: var(--text-secondary); }
    .match-arrow { color: var(--text-faint); margin: 0 2px; }
    .match-var {
      font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
      font-size: 10px;
      font-weight: 500;
    }
    .match-var.high { color: var(--match-high); text-shadow: 0 0 8px var(--match-high-glow); }
    .match-var.medium { color: var(--match-medium); text-shadow: 0 0 8px var(--match-medium-glow); }
    .match-var.low { color: var(--text-muted); }
    .match-collection {
      font-size: 9px;
      color: var(--text-faint);
      margin-left: 4px;
    }
    .color-swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      vertical-align: middle;
      margin-right: 3px;
      border: 1px solid var(--swatch-border);
    }

    /* ── Variable selector (when multiple match) ── */
    .var-select {
      font-family: inherit;
      font-size: 10px;
      padding: 2px 4px;
      border: 1px solid var(--btn-secondary-border);
      border-radius: 3px;
      background: var(--surface-input);
      color: var(--text-body);
      max-width: 100%;
    }

    /* ── Notification ── */
    .notification {
      display: none;
      padding: 8px 12px;
      margin: 12px 0 0 0;
      border-radius: 6px;
      font-size: 11px;
      position: relative;
    }
    .notification.visible { display: block; }
    #scan-note { padding-right: 24px; }
    .notification .dismiss {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      right: 8px;
      background: none;
      border: none;
      color: inherit;
      opacity: 0.5;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      padding: 0 2px;
      font-family: inherit;
    }
    .notification .dismiss:hover { opacity: 1; }
    .notification.success { background: var(--notify-success-bg); color: var(--notify-success-text); border: 1px solid var(--notify-success-border); }
    .notification.error { background: var(--notify-error-bg); color: var(--notify-error-text); border: 1px solid var(--notify-error-border); }
    .notification.info { background: var(--notify-info-bg); color: var(--notify-info-text); border: 1px solid var(--notify-info-border); }

    /* ── Scan loading state ── */
    .scan-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
      gap: 12px;
      color: var(--text-muted);
      font-size: 12px;
    }
    .css-spinner {
      width: 24px;
      height: 24px;
      border: 2.5px solid rgba(67,56,202,0.25);
      border-top-color: #4338CA;
      border-radius: 50%;
      animation: css-spin 0.7s linear infinite;
      will-change: transform;
    }
    @keyframes css-spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 24px 16px;
      color: var(--text-muted);
    }
    .empty-state p { margin-top: 4px; font-size: 11px; }

    /* ── Error list ── */
    .error-list {
      margin-top: 6px;
      padding-left: 16px;
      font-size: 10px;
      color: var(--notify-error-text);
    }
    .error-list li { margin-bottom: 2px; }

    /* ── Scrollable content ── */
    .content {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }

    /* ── Apply bar (footer) ── */
    .apply-bar {
      background: var(--bg-surface);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      flex-shrink: 0;
    }
    .apply-row {
      display: flex;
      gap: 8px;
    }
    .apply-row .btn-success { flex: 1; }
    .apply-row .btn-secondary { flex: 0 0 auto; }

    /* ── Snackbar ── */
    .snackbar {
      position: fixed;
      bottom: 12px;
      left: 16px;
      right: 16px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 11px;
      text-align: center;
      z-index: 100;
      opacity: 1;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .snackbar.fade-out { opacity: 0; }
    .snackbar.success {
      background: var(--notify-success-bg);
      color: var(--notify-success-text);
      border: 1px solid var(--notify-success-border);
    }
    .snackbar.info {
      background: var(--notify-info-bg);
      color: var(--notify-info-text);
      border: 1px solid var(--notify-info-border);
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border-subtle);
      text-align: center;
      font-size: 10px;
      color: var(--text-faint);
      flex-shrink: 0;
    }
    .footer a {
      color: var(--accent-link);
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
      text-shadow: 0 0 8px var(--accent-link-glow);
    }
    .footer a:hover { text-decoration: underline; color: var(--accent-link-hover); text-shadow: 0 0 12px var(--accent-link-glow-hover); }
    .footer a { transition: color 0.15s, text-shadow 0.15s; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <h1>Dressing Room</h1>
    <div class="theme-group">
      <button id="theme-light" title="Light mode"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg></button>
      <button id="theme-dark" title="Dark mode" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
    </div>
  </div>

  <!-- Scrollable content -->
  <div class="content">

  <!-- Scan section -->
  <div class="section">
    <div style="display:flex;gap:8px;">
      <button id="scan-btn" class="btn btn-primary" disabled style="flex:1;">Scan Selection</button>
      <button id="strip-btn" class="btn btn-secondary" disabled style="flex:0 0 auto;">Strip Tokens</button>
    </div>
    <div id="battery" class="battery"></div>
    <div id="scan-note" class="notification info visible" style="margin-top:8px;padding-right:24px;">
      <span id="scan-note-text">Initializing...</span>
      <button class="dismiss" onclick="this.parentElement.classList.remove('visible')">&times;</button>
    </div>
    <!-- Token summary (populated after scan) -->
    <div id="token-summary" class="token-summary"></div>
  </div>

  <!-- Results section -->
  <div id="results" class="results section">
    <div class="results-header">
      <label>
        <input type="checkbox" id="select-all" checked>
        Select all
      </label>
      <span id="results-count" class="results-count"></span>
    </div>
    <div id="results-list"></div>
  </div>

  <!-- Loading spinner (shared for scan + apply) -->
  <div id="scan-loading" class="scan-loading" style="display:none;">
    <div class="css-spinner"></div>
    <span id="loading-text">Scanning layers...</span>
  </div>

  <!-- Empty state -->
  <div id="empty-state" class="empty-state" style="display:none;">
    <strong>No untokenized values found</strong>
    <p>Every scanned property is either already bound to a variable or has no matching variable in your libraries.</p>
  </div>


  </div><!-- /content -->

  <!-- Apply bar (shown when results exist) -->
  <div id="apply-bar" class="apply-bar" style="display:none;">
    <div class="apply-row">
      <button id="apply-btn" class="btn btn-success">Apply Selected</button>
      <button id="undo-btn" class="btn btn-secondary" style="display:none;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="vertical-align:-1px;"><path d="M3 10h10a5 5 0 0 1 0 10H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 6L3 10l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Undo</button>
    </div>
  </div>
  <div id="snackbar" class="snackbar" style="display:none;"></div>

  <!-- Footer -->
  <div class="footer">
    Made by Amir Noyman · <a id="support-link"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="vertical-align:-1px;margin-right:3px;"><path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 1v3M10 1v3M14 1v3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>Buy me a coffee</a>
  </div>

  <div style="margin-top:auto;padding:8px 16px 10px;text-align:center;font-size:9px;color:var(--text-powered);letter-spacing:0.5px;">Powered by <a id="foundry-link" style="color:var(--accent-link);text-decoration:none;cursor:pointer;font-weight:500;text-shadow:0 0 8px var(--accent-link-glow);">Foundry Design System</a></div>

  <script>
    // ─── Config ─────────────────────────────────────────────────
    var BMC_URL = 'https://buymeacoffee.com/amirno';
    var FOUNDRY_URL = 'https://www.figma.com/design/QlRckEbTfNJhLfldXB5RH1/Foundry?node-id=3046-20195&t=EcKv3PVNUuXBoblD-1';

    // ─── State ──────────────────────────────────────────────────
    var matches = [];
    var selectedSet = new Set();
    var chosenVar = {};
    var collapsedCategories = {};

    // ─── DOM refs ───────────────────────────────────────────────
    var scanBtn = document.getElementById('scan-btn');
    var scanNote = document.getElementById('scan-note');
    var scanNoteText = document.getElementById('scan-note-text');
    var battery = document.getElementById('battery');
    var tokenSummary = document.getElementById('token-summary');
    var resultsEl = document.getElementById('results');
    var resultsList = document.getElementById('results-list');
    var resultsCount = document.getElementById('results-count');
    var selectAll = document.getElementById('select-all');
    var applyBar = document.getElementById('apply-bar');
    var stripBtn = document.getElementById('strip-btn');
    var applyBtn = document.getElementById('apply-btn');
    var undoBtn = document.getElementById('undo-btn');
    var snackbar = document.getElementById('snackbar');
    var snackbarTimer = null;

    function showSnackbar(html, type, duration) {
      if (snackbarTimer) { clearTimeout(snackbarTimer); snackbarTimer = null; }
      snackbar.className = 'snackbar ' + (type || 'success');
      snackbar.innerHTML = html;
      snackbar.style.display = '';
      snackbar.classList.remove('fade-out');
      snackbarTimer = setTimeout(function() {
        snackbar.classList.add('fade-out');
        snackbarTimer = setTimeout(function() {
          snackbar.style.display = 'none';
          snackbarTimer = null;
        }, 400);
      }, duration || 5000);
    }
    var emptyState = document.getElementById('empty-state');
    var scanLoading = document.getElementById('scan-loading');
    var loadingText = document.getElementById('loading-text');

    // ─── UI field labels ────────────────────────────────────────
    var LABEL = {
      itemSpacing: 'Gap',
      counterAxisSpacing: 'Cross-axis gap',
      paddingLeft: 'Padding left',
      paddingRight: 'Padding right',
      paddingTop: 'Padding top',
      paddingBottom: 'Padding bottom',
      topLeftRadius: 'Top-left radius',
      topRightRadius: 'Top-right radius',
      bottomLeftRadius: 'Bottom-left radius',
      bottomRightRadius: 'Bottom-right radius',
      strokeWeight: 'Stroke weight',
      fontSize: 'Font size',
      fontFamily: 'Font family',
      lineHeight: 'Line height',
      letterSpacing: 'Letter spacing',
    };

    function getLabel(field) {
      if (LABEL[field]) return LABEL[field];
      if (field.startsWith('fill:')) return 'Fill color';
      if (field.startsWith('stroke:')) return 'Stroke color';
      return field;
    }

    var scanTimer = null;

    // ─── Event handlers ─────────────────────────────────────────

    // ─── Theme toggle ─────────────────────────────────────────
    var themeLightBtn = document.getElementById('theme-light');
    var themeDarkBtn = document.getElementById('theme-dark');
    function setTheme(theme) {
      document.body.setAttribute('data-theme', theme);
      themeLightBtn.classList.toggle('active', theme === 'light');
      themeDarkBtn.classList.toggle('active', theme === 'dark');
    }
    setTheme('dark'); // default
    themeLightBtn.addEventListener('click', function() { setTheme('light'); });
    themeDarkBtn.addEventListener('click', function() { setTheme('dark'); });

    document.getElementById('support-link').addEventListener('click', function() {
      parent.postMessage({ pluginMessage: { type: 'open-url', url: BMC_URL } }, '*');
    });

    document.getElementById('foundry-link').addEventListener('click', function() {
      parent.postMessage({ pluginMessage: { type: 'open-url', url: FOUNDRY_URL } }, '*');
    });

    scanBtn.addEventListener('click', function() {
      parent.postMessage({ pluginMessage: { type: 'scan' } }, '*');
      scanBtn.disabled = true;
      scanBtn.textContent = 'Scanning...';
      scanNote.className = 'notification';
      scanNote.classList.remove('visible');
      resultsEl.classList.remove('visible');
      emptyState.style.display = 'none';
      applyBar.style.display = 'none';
      tokenSummary.classList.remove('visible');
      hideBattery();
      undoBtn.style.display = 'none';
      applyBtn.style.display = '';
      loadingText.textContent = 'Scanning layers...';
      scanLoading.style.display = 'flex';
    });

    stripBtn.addEventListener('click', function() {
      parent.postMessage({ pluginMessage: { type: 'strip' } }, '*');
      stripBtn.disabled = true;
      stripBtn.textContent = 'Stripping...';
      scanNote.className = 'notification info visible';
      scanNoteText.textContent = 'Removing all token bindings from selection...';
    });

    selectAll.addEventListener('change', function() {
      var checked = selectAll.checked;
      for (var i = 0; i < matches.length; i++) {
        if (checked) selectedSet.add(i);
        else selectedSet.delete(i);
      }
      document.querySelectorAll('.match-cb').forEach(function(cb) { cb.checked = checked; });
      updateApplyBtn();
    });

    applyBtn.addEventListener('click', function() {
      var items = [];
      selectedSet.forEach(function(idx) {
        var m = matches[idx];
        var varId = chosenVar[idx] || m.candidates[0].id;
        items.push({ nodeId: m.nodeId, field: m.field, variableId: varId });
      });
      if (items.length === 0) return;
      parent.postMessage({ pluginMessage: { type: 'apply', items: items } }, '*');
      applyBtn.disabled = true;
      applyBtn.textContent = 'Applying...';
      undoBtn.style.display = 'none';
      resultsEl.classList.remove('visible');
      loadingText.textContent = 'Applying ' + items.length + ' token' + (items.length !== 1 ? 's' : '') + '...';
      scanLoading.style.display = 'flex';
    });

    undoBtn.addEventListener('click', function() {
      parent.postMessage({ pluginMessage: { type: 'undo' } }, '*');
      undoBtn.disabled = true;
      undoBtn.textContent = 'Undoing...';
    });

    // ─── Message handler ────────────────────────────────────────

    window.onmessage = function(event) {
      var msg = event.data.pluginMessage;
      if (!msg) return;
      var checkSvg = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="vertical-align:-1px;margin-right:4px;"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';

      // Clear scan spinner and restore button on any response
      if (msg.type === 'results' || msg.type === 'error') {
        scanLoading.style.display = 'none';
        scanBtn.disabled = false;
        scanBtn.textContent = 'Scan Selection';
      }

      switch (msg.type) {
        case 'ready':
          scanBtn.disabled = false;
          stripBtn.disabled = false;
          scanNote.className = 'notification info visible';
          scanNoteText.textContent = 'Select layers, then click Scan to detect matching tokens.';
          break;

        case 'scanning':
          break;

        case 'results':
          matches = msg.matches;
          selectedSet = new Set();
          chosenVar = {};

          // Build stats text
          var statsText = '';
          if (msg.stats) {
            var s = msg.stats;
            statsText = s.nodesScanned + ' nodes, ' + s.propsChecked + ' props, ' +
              s.alreadyBound + ' bound' +
              ', ' + s.noMatch + ' no match';
          }

          if (matches.length === 0) {
            resultsEl.classList.remove('visible');
            emptyState.style.display = 'block';
            applyBar.style.display = 'none';
            scanNote.className = 'notification info visible';
            scanNoteText.textContent = statsText || 'No matches found.';
            tokenSummary.classList.remove('visible');
            hideBattery();
          } else {
            emptyState.style.display = 'none';
            scanNote.className = 'notification success visible';
            scanNoteText.textContent = matches.length + ' tokens to apply (' + statsText + ')';

            // Select all by default
            for (var i = 0; i < matches.length; i++) selectedSet.add(i);
            selectAll.checked = true;

            renderBattery();
            renderTokenSummary();
            renderResults();
            resultsEl.classList.add('visible');
            applyBar.style.display = 'block';
          }
          break;

        case 'applied':
          scanLoading.style.display = 'none';
          var total = msg.ok + msg.fail;
          if (msg.fail === 0) {
            showSnackbar(checkSvg + 'Applied ' + msg.ok + '/' + total + ' tokens.', 'success');
          } else {
            showSnackbar('Applied ' + msg.ok + '/' + total + ' tokens.', 'info');
          }

          // Remove successfully applied matches
          var applied = new Set();
          selectedSet.forEach(function(idx) { applied.add(idx); });
          var remaining = [];
          for (var ri = 0; ri < matches.length; ri++) {
            if (!applied.has(ri)) remaining.push(matches[ri]);
          }
          matches = remaining;
          selectedSet = new Set();
          chosenVar = {};

          if (matches.length === 0) {
            resultsEl.classList.remove('visible');
            hideBattery();
            applyBtn.disabled = true;
            applyBtn.textContent = 'Apply Selected';
          } else {
            for (var si = 0; si < matches.length; si++) selectedSet.add(si);
            selectAll.checked = true;
            renderBattery();
            renderTokenSummary();
            renderResults();
            applyBtn.disabled = false;
            updateApplyBtn();
          }
          // Show undo button next to apply
          if (msg.canUndo) {
            undoBtn.style.display = '';
            undoBtn.disabled = false;
            undoBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="vertical-align:-1px;"><path d="M3 10h10a5 5 0 0 1 0 10H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 6L3 10l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Undo';
            applyBar.style.display = 'block';
          }
          break;

        case 'stripping':
          scanNote.className = 'notification info visible';
          scanNoteText.textContent = 'Removing token bindings...';
          break;

        case 'stripped':
          stripBtn.disabled = false;
          stripBtn.textContent = 'Strip Tokens';

          if (msg.stripped === 0) {
            scanNote.className = 'notification info visible';
            scanNoteText.textContent = 'No token bindings found to remove.';
          } else {
            showSnackbar(checkSvg + 'Stripped ' + msg.stripped + ' token binding' + (msg.stripped !== 1 ? 's' : '') + '.', 'success');
            scanNote.className = 'notification';
            scanNote.classList.remove('visible');
          }
          // Clear results since bindings changed
          resultsEl.classList.remove('visible');
          tokenSummary.classList.remove('visible');
          hideBattery();
          // Show undo button
          if (msg.canUndo) {
            undoBtn.style.display = '';
            undoBtn.disabled = false;
            undoBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="vertical-align:-1px;"><path d="M3 10h10a5 5 0 0 1 0 10H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 6L3 10l4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> Undo';
            applyBar.style.display = 'block';
          } else {
            applyBar.style.display = 'none';
          }
          break;

        case 'undone':
          undoBtn.style.display = 'none';
          applyBar.style.display = 'none';
          if (msg.ok > 0) {
            showSnackbar('<svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="vertical-align:-1px;margin-right:4px;"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>Undone ' + msg.ok + '/' + msg.total + ' changes.', 'info');
          } else {
            scanNote.className = 'notification error visible';
            scanNoteText.textContent = 'Undo failed.';
          }
          break;

        case 'error':
          scanNote.className = 'notification error visible';
          scanNoteText.textContent = msg.message;
          break;
      }
    };

    // ─── Battery bar (category breakdown) ─────────────────────

    function renderBattery() {
      var categoryOrder = ['Color', 'Spacing', 'Typography', 'Radius', 'Borders', 'Other'];
      var counts = {};
      for (var i = 0; i < matches.length; i++) {
        var cat = matches[i].category || 'Other';
        counts[cat] = (counts[cat] || 0) + 1;
      }

      var html = '';
      for (var c = 0; c < categoryOrder.length; c++) {
        var cat = categoryOrder[c];
        var count = counts[cat];
        if (!count) continue;
        html += '<div class="battery-segment ' + cat + '" style="flex-grow:' + count + '" title="' + cat + ': ' + count + '"></div>';
      }

      battery.innerHTML = html;
      battery.classList.add('visible');
    }

    function hideBattery() {
      battery.classList.remove('visible');
      battery.innerHTML = '';
    }

    // ─── Token summary (scrollable list of detected tokens) ─────

    function renderTokenSummary() {
      // Count instances per variable name
      var tokenCounts = {};
      var tokenMeta = {}; // name → { collection, category }
      for (var i = 0; i < matches.length; i++) {
        var m = matches[i];
        var best = chosenVar[i] ? findCandidate(m, chosenVar[i]) : m.candidates[0];
        if (!best) continue;
        var key = best.name;
        tokenCounts[key] = (tokenCounts[key] || 0) + 1;
        if (!tokenMeta[key]) {
          tokenMeta[key] = { collection: best.collection, category: m.category };
        }
      }

      // Sort by count descending
      var sorted = Object.keys(tokenCounts).sort(function(a, b) {
        return tokenCounts[b] - tokenCounts[a];
      });

      var html = '<div class="token-summary-header">';
      html += '<span>Detected tokens</span>';
      html += '<span>' + sorted.length + ' unique</span>';
      html += '</div>';
      html += '<div class="token-summary-list">';
      for (var j = 0; j < sorted.length; j++) {
        var name = sorted[j];
        var meta = tokenMeta[name];
        html += '<div class="token-summary-row">';
        html += '<span>';
        html += '<span class="token-summary-name">' + escapeHtml(name) + '</span>';
        html += '<span class="token-summary-collection">' + escapeHtml(meta.collection) + '</span>';
        html += '</span>';
        html += '<span class="token-summary-count">' + tokenCounts[name] + 'x</span>';
        html += '</div>';
      }
      html += '</div>';

      tokenSummary.innerHTML = html;
      tokenSummary.classList.add('visible');
    }

    function findCandidate(match, varId) {
      for (var i = 0; i < match.candidates.length; i++) {
        if (match.candidates[i].id === varId) return match.candidates[i];
      }
      return match.candidates[0];
    }

    // ─── Render results grouped by category (accordion) ─────────

    function renderResults() {
      var groups = {};
      var categoryOrder = ['Color', 'Spacing', 'Typography', 'Radius', 'Borders', 'Other'];

      matches.forEach(function(m, i) {
        var cat = m.category || 'Other';
        if (!groups[cat]) groups[cat] = [];
        groups[cat].push({ match: m, index: i });
      });

      var html = '';

      for (var c = 0; c < categoryOrder.length; c++) {
        var cat = categoryOrder[c];
        var items = groups[cat];
        if (!items || items.length === 0) continue;

        var isCollapsed = (collapsedCategories[cat] === false) ? '' : ' collapsed';
        html += '<div class="category' + isCollapsed + '" data-category="' + cat + '">';
        html += '<div class="category-header" data-category="' + cat + '">';
        html += '<span class="category-dot ' + cat + '"></span>';
        html += cat + ' (' + items.length + ')';
        html += '<span class="category-chevron">&#9660;</span>';
        html += '</div>';
        html += '<div class="category-body">';

        for (var i = 0; i < items.length; i++) {
          var match = items[i].match;
          var index = items[i].index;
          var best = match.candidates[0];
          var confClass = best.confidence === 2 ? 'high' : best.confidence === 1 ? 'medium' : 'low';
          var isChecked = selectedSet.has(index) ? 'checked' : '';
          var label = getLabel(match.field);

          // Format raw value — with color swatch for hex colors
          var valueStr;
          if (typeof match.rawValue === 'string' && match.rawValue.startsWith('#')) {
            valueStr = '<span class="color-swatch" style="background:' + match.rawValue + '"></span>' + match.rawValue;
          } else if (typeof match.rawValue === 'number') {
            valueStr = match.rawValue + 'px';
          } else {
            valueStr = '"' + escapeHtml(String(match.rawValue)) + '"';
          }

          html += '<div class="match-row">';
          html += '<input type="checkbox" class="match-cb" data-idx="' + index + '" ' + isChecked + '>';
          html += '<div class="match-info">';
          html += '<div class="match-node">' + escapeHtml(match.nodeName) + '</div>';
          html += '<div class="match-detail">';
          html += '<span class="field">' + label + ':</span> ';
          html += '<span class="value">' + valueStr + '</span>';
          html += '<span class="match-arrow"> &rarr; </span>';

          if (match.candidates.length > 1) {
            html += '<select class="var-select" data-idx="' + index + '">';
            for (var k = 0; k < match.candidates.length; k++) {
              var cand = match.candidates[k];
              var selected = cand.id === best.id ? ' selected' : '';
              html += '<option value="' + cand.id + '"' + selected + '>';
              html += cand.name + ' (' + cand.collection + ')';
              html += '</option>';
            }
            html += '</select>';
          } else {
            html += '<span class="match-var ' + confClass + '">' + escapeHtml(best.name) + '</span>';
            html += '<span class="match-collection">' + escapeHtml(best.collection) + '</span>';
          }

          html += '</div></div></div>';
        }

        html += '</div></div>';
      }

      resultsList.innerHTML = html;
      resultsCount.textContent = matches.length + ' untokenized';
      updateApplyBtn();

      // Attach checkbox listeners
      document.querySelectorAll('.match-cb').forEach(function(cb) {
        cb.addEventListener('change', function(e) {
          var idx = parseInt(e.target.getAttribute('data-idx'));
          if (e.target.checked) selectedSet.add(idx);
          else selectedSet.delete(idx);
          updateSelectAll();
          updateApplyBtn();
        });
      });

      // Attach dropdown listeners
      document.querySelectorAll('.var-select').forEach(function(sel) {
        sel.addEventListener('change', function(e) {
          var idx = parseInt(e.target.getAttribute('data-idx'));
          chosenVar[idx] = e.target.value;
        });
      });

      // Attach accordion toggle listeners
      document.querySelectorAll('.category-header').forEach(function(hdr) {
        hdr.addEventListener('click', function(e) {
          var cat = e.currentTarget.getAttribute('data-category');
          var categoryEl = e.currentTarget.parentElement;
          categoryEl.classList.toggle('collapsed');
          collapsedCategories[cat] = categoryEl.classList.contains('collapsed') ? true : false;
        });
      });
    }

    // ─── Helpers ────────────────────────────────────────────────

    function updateApplyBtn() {
      var count = selectedSet.size;
      applyBtn.disabled = count === 0;
      applyBtn.textContent = count === 0
        ? 'Apply Selected'
        : 'Apply ' + count + ' Token' + (count !== 1 ? 's' : '');
    }

    function updateSelectAll() {
      if (matches.length === 0) return;
      selectAll.checked = selectedSet.size === matches.length;
      selectAll.indeterminate = selectedSet.size > 0 && selectedSet.size < matches.length;
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

  </script>
</body>
